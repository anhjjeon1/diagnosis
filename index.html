<script>
var CONFIG={MIN_HEADROOM:10,IMP_STRONG:6,IMP_GOOD:3,PHONE_ERR:3,
rules:[
{test:function(imp){return imp>=6},label:"◎ 뚜렷한 개선",color:"#1B5E20"},
{test:function(imp){return imp>=3},label:"○ 개선",color:"#2E7D32"},
{test:function(imp){return imp>=0},label:"△ 오차범위",color:"#7A8A80",note:"휴대폰 앱 오차 ±3dB"},
{test:function(imp){return imp<0},label:"✕ 재확인",color:"#C62828"}
],
STORAGE_KEY:"frogsash_seal_v4",GAS_URL:"",GEMINI_PROXY_URL:"https://script.google.com/macros/s/AKfycbxkAACBKNNG76fEO5neH-Xw3Sg-DgN2DulIEo-taSxZU9zohpNUlWK65TtkmVehAZUX/exec",
NOTICE:"본 측정은 상대적 밀폐·차음 개선 확인용이며, 법적 기밀성 등급(KS F 2292 통기량)과는 다른 지표입니다. 휴대폰 앱 측정 오차 ±3dB 내외.",
COMPANY:"청개구리샤시 · 1599-7380 · frogsash.co.kr"};

var locations=[],chartMode="bar",aiMode="pro";
function $(s){return document.querySelector(s)}
function num(v){var n=parseFloat(v);return isNaN(n)?null:n}
function avg(a){var v=a.map(num).filter(function(x){return x!==null});return v.length?v.reduce(function(p,q){return p+q},0)/v.length:null}
function r1(n){return Math.round(n*10)/10}
function escapeHtml(s){return String(s==null?"":s).replace(/[&<>"']/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]})}
function toast(m){var t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove("show")},2000)}
function today(){var d=new Date(),z=function(n){return String(n).padStart(2,"0")};return d.getFullYear()+"-"+z(d.getMonth()+1)+"-"+z(d.getDate())}

function judge(imp){for(var i=0;i<CONFIG.rules.length;i++){var r=CONFIG.rules[i];if(r.test(imp))return r}return CONFIG.rules[CONFIG.rules.length-1]}
function computeLoc(loc){
  var bAvg=avg(loc.before),aAvg=avg(loc.after);
  if(bAvg===null||aAvg===null)return{ready:false,bAvg:null,aAvg:null,imp:null,j:null};
  var imp=r1(bAvg-aAvg);
  return{ready:true,bAvg:r1(bAvg),aAvg:r1(aAvg),imp:imp,j:judge(imp)};
}

var _ocr=null;
function getOCR(){
  if(_ocr)return _ocr;
  if(typeof Tesseract==="undefined")return null;
  _ocr=Tesseract.createWorker("eng").then(function(w){return w.setParameters({tessedit_char_whitelist:"0123456789."}).then(function(){return w})});
  return _ocr;
}
function ocrPhoto(dataUrl,cb){
  var p=getOCR();if(!p){cb(null);return}
  var im=new Image();
  im.onload=function(){
    // 작은 글씨(평균값) 인식률을 위해 1.6배 업스케일
    var cv=document.createElement("canvas");cv.width=Math.round(im.width*1.6);cv.height=Math.round(im.height*1.6);
    cv.getContext("2d").drawImage(im,0,0,cv.width,cv.height);
    var up=cv.toDataURL("image/png");
    p.then(function(w){return w.recognize(up)}).then(function(res){
      // 실내 소음 범위(20~99)만, 다이얼 눈금 100/120 등은 자동 제외
      var all=(res.data.text.match(/\d{2,3}(?:\.\d)?/g)||[]).map(parseFloat).filter(function(n){return n>=20&&n<=99});
      if(!all.length){cb(null);return}
      // 평균(LAeq)은 소수 한 자리(예: 37.0)로 표기 → 소수값 우선
      var dec=all.filter(function(n){return n%1!==0});
      if(dec.length){cb(dec[0]);return}
      // 소수 인식 실패 시: 다이얼 눈금값 제외 후 중앙값(최소·평균·최대 중 가운데=평균)
      var SCALE={20:1,40:1,60:1,80:1};
      var cand=all.filter(function(n){return !SCALE[n]});if(!cand.length)cand=all;
      cand.sort(function(a,b){return a-b});
      cb(cand[Math.floor((cand.length-1)/2)]);
    }).catch(function(){cb(null)});
  };
  im.onerror=function(){cb(null)};
  im.src=dataUrl;
}
function readPhoto(file,cb){
  if(!file)return;
  var r=new FileReader();
  r.onload=function(e){var img=new Image();img.onload=function(){
    var max=1200,w=img.width,h=img.height;
    if(w>max||h>max){if(w>=h){h=Math.round(h*max/w);w=max}else{w=Math.round(w*max/h);h=max}}
    var cv=document.createElement("canvas");cv.width=w;cv.height=h;cv.getContext("2d").drawImage(img,0,0,w,h);
    cb(cv.toDataURL("image/jpeg",0.7));
  };img.src=e.target.result};
  r.readAsDataURL(file);
}
function photoHtml(url,cap,kind,id,inlabel){
  if(url)return '<div class="photo-thumb"><img src="'+url+'"><span class="photo-cap">'+cap+'</span><button class="photo-del" data-delphoto="'+kind+'" data-id="'+id+'" aria-label="사진 삭제">✕</button></div>';
  return '<button class="photo-btn" data-addphoto="'+kind+'" data-id="'+id+'"><span class="cam">📷</span>'+(inlabel?'<span class="ph-lab">'+inlabel+'</span>':'')+'</button><input type="file" accept="image/*" class="hidden-file" data-file="'+kind+'" data-id="'+id+'">';
}
var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
function startVoice(id,btn){
  if(!SR){toast("이 브라우저는 음성 입력을 지원하지 않습니다");return}
  var loc=locations.filter(function(l){return String(l.id)===id})[0];if(!loc)return;
  var rec=new SR();rec.lang="ko-KR";rec.interimResults=false;rec.maxAlternatives=1;
  if(btn)btn.classList.add("rec");toast("위치명을 말씀하세요…");
  rec.onresult=function(e){loc.name=(e.results[0][0].transcript||"").replace(/[.\s]+$/,"");render();save()};
  rec.onerror=function(){toast("음성 인식 실패 — 다시 시도하세요")};
  rec.onend=function(){if(btn)btn.classList.remove("rec")};
  try{rec.start()}catch(err){if(btn)btn.classList.remove("rec")}
}
function usSet(loc,kind,url){var side=kind.charAt(2)==="B"?"b":"a";var idx=parseInt(kind.slice(3));if(loc.us&&loc.us[idx])loc.us[idx][side]=url;}
function addLocation(data){locations.push(data||{id:String(Date.now())+Math.random().toString(36).slice(2,6),name:"",before:[""],after:[""],beforePhoto:null,afterPhoto:null,placeLPhoto:null,placeRPhoto:null,us:[{b:null,a:null}]});render();save()}
function delLocation(idStr){locations=locations.filter(function(l){return String(l.id)!==idStr});if(!locations.length)addLocation();else{render();save();}}

function render(){
  var list=$("#locList");
  list.innerHTML=locations.map(function(loc,i){
    function one(field){return '<input class="db" inputmode="decimal" placeholder="dB" value="'+escapeHtml(loc[field][0])+'" data-id="'+loc.id+'" data-f="'+field+'" data-k="0">'}
    return '<div class="loc"><div class="loc-head"><span class="loc-no">2</span>'
      +'<input class="name-inp" value="'+escapeHtml(loc.name)+'" placeholder="위치명 (음성 또는 입력)" data-id="'+loc.id+'" data-f="name">'
      +'<button class="mic-btn" data-mic="'+loc.id+'" aria-label="음성 입력"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 10v1a7 7 0 0 0 14 0v-1"/><line x1="12" y1="19" x2="12" y2="22"/></svg></button>'
      +'</div>'
      +'<div class="loc-pad"><div class="seg-label" style="color:var(--ink-2);margin-top:0"><span class="dot before"></span>점검창호</div>'
      +'<div class="photo-row"><div class="photo-cell"><div class="photo-slot ratio34">'+photoHtml(loc.placeLPhoto,"점검창호","placeL",loc.id)+'</div></div><div class="photo-cell"><div class="photo-slot ratio34">'+photoHtml(loc.placeRPhoto,"점검창호","placeR",loc.id)+'</div></div></div>'
      +'<div class="seg-label before"><span class="stepno">3</span>소음 측정 · 평균소음도 LAeq 기준</div>'
      +'<div class="photo-row"><div class="photo-cell"><div class="photo-slot ratio34">'+photoHtml(loc.beforePhoto,"수리 전","before",loc.id,"수리전 소음측정")+'</div></div><div class="photo-cell"><div class="photo-slot ratio34">'+photoHtml(loc.afterPhoto,"수리 후","after",loc.id,"수리후 소음측정")+'</div></div></div>'
      +'<div class="onoff" style="margin-top:5px"><div class="dbcell"><span class="mini-lab">수리전 (LAeq)</span><input class="db" inputmode="decimal" placeholder="dB" value="'+escapeHtml(loc.before[0])+'" data-id="'+loc.id+'" data-f="before" data-k="0"></div><div class="dbcell"><span class="mini-lab">수리후 (LAeq)</span><input class="db" inputmode="decimal" placeholder="dB" value="'+escapeHtml(loc.after[0])+'" data-id="'+loc.id+'" data-f="after" data-k="0"></div></div>'
      +'<div class="loc-res empty" id="res_'+loc.id+'"></div>'
      +'<div class="seg-label after"><span class="stepno">4</span>초음파 카메라 측정</div>'
      +loc.us.map(function(p,ui){return (ui>0?'<div class="us-pair-head"><span>초음파 측정 '+(ui+1)+'</span><button data-usdel="'+ui+'" data-id="'+loc.id+'">✕ 행 삭제</button></div>':'')
        +'<div class="photo-row"><div class="photo-cell"><div class="photo-slot ratio34">'+photoHtml(p.b,"초음파 전","usB"+ui,loc.id,"초음파 수리 전")+'</div></div><div class="photo-cell"><div class="photo-slot ratio34">'+photoHtml(p.a,"초음파 후","usA"+ui,loc.id,"초음파 수리 후")+'</div></div></div>';}).join("")
      +'<button class="us-add" data-usadd="'+loc.id+'">＋ 초음파 측정 추가</button></div></div>';
  }).join("");
  list.querySelectorAll("input[data-f]").forEach(function(inp){
    inp.addEventListener("input",function(e){
      var loc=locations.filter(function(l){return String(l.id)===e.target.dataset.id})[0];
      if(!loc)return;
      var f=e.target.dataset.f;
      if(f==="name")loc.name=e.target.value;else loc[f][parseInt(e.target.dataset.k)]=e.target.value;
      updateLocResult(loc);updateSummary();renderChart();save();
    });
  });
  list.querySelectorAll("[data-del]").forEach(function(b){b.addEventListener("click",function(){delLocation(b.dataset.del)})});
  list.querySelectorAll("[data-mic]").forEach(function(b){b.addEventListener("click",function(){startVoice(b.dataset.mic,b)})});
  list.querySelectorAll("[data-addphoto]").forEach(function(b){b.addEventListener("click",function(){var inp=list.querySelector('input[data-file="'+b.dataset.addphoto+'"][data-id="'+b.dataset.id+'"]');if(inp)inp.click()})});
  list.querySelectorAll("input[data-file]").forEach(function(inp){inp.addEventListener("change",function(e){var f=e.target.files[0];if(!f)return;var kind=inp.dataset.file,id=inp.dataset.id;readPhoto(f,function(url){var loc=locations.filter(function(l){return String(l.id)===id})[0];if(!loc)return;if(kind.indexOf("us")===0){usSet(loc,kind,url);render();}else{loc[kind+"Photo"]=url;render();}if(kind==="before"||kind==="after"){toast("사진에서 dB 분석 중…");ocrPhoto(url,function(db){var l2=locations.filter(function(l){return String(l.id)===id})[0];if(!l2)return;if(db!=null){l2[kind]=[String(db)];render();toast("평균 "+db+" dB 자동입력("+(kind==="before"?"수리 전":"수리 후")+") — 필요시 수정하세요");}else{toast("사진에서 dB를 못 읽었어요");}})}})})});
  list.querySelectorAll("[data-delphoto]").forEach(function(b){b.addEventListener("click",function(){var loc=locations.filter(function(l){return String(l.id)===b.dataset.id})[0];if(!loc)return;var k=b.dataset.delphoto;if(k.indexOf("us")===0)usSet(loc,k,null);else loc[k+"Photo"]=null;render()})});
  list.querySelectorAll("[data-usadd]").forEach(function(b){b.addEventListener("click",function(){var loc=locations.filter(function(l){return String(l.id)===b.dataset.usadd})[0];if(!loc)return;loc.us.push({b:null,a:null});render()})});
  list.querySelectorAll("[data-usdel]").forEach(function(b){b.addEventListener("click",function(){var loc=locations.filter(function(l){return String(l.id)===b.dataset.id})[0];if(!loc)return;loc.us.splice(parseInt(b.dataset.usdel),1);render()})});
  locations.forEach(updateLocResult);updateSummary();renderChart();
}

function updateLocResult(loc){
  var box=document.getElementById("res_"+loc.id);if(!box)return;
  var c=computeLoc(loc);
  if(!c.ready){box.className="loc-res empty";box.innerHTML="";return}
  box.className="loc-res";
  var impTxt=(c.imp>0?"−":"")+Math.abs(c.imp)+"dB";
  box.innerHTML='<span class="flow"><span class="v">'+c.bAvg+'</span><span class="arrow">→</span><span class="v">'+c.aAvg+'</span>&nbsp;<span class="imp" style="color:'+c.j.color+'">'+impTxt+'</span></span><span class="badge" style="background:'+c.j.color+'">'+c.j.label+'</span>';
}

function comment(m){
  if(m>=6)return "평균 "+m.toFixed(1)+"dB 감소 — 체감상 확연히 조용해지는 수준입니다.";
  if(m>=3)return "평균 "+m.toFixed(1)+"dB 감소 — 또렷하게 체감되는 개선입니다.";
  if(m>=0)return "평균 "+m.toFixed(1)+"dB 변화 — 휴대폰 앱 오차(±3dB) 범위입니다.";
  return "평균 "+m.toFixed(1)+"dB — 재측정·재확인이 필요합니다.";
}

function updateSummary(){
  var valid=locations.map(computeLoc).filter(function(c){return c.ready});
  var condFilled=!!($("#c_site").value);
  $("#st1").classList.toggle("on",condFilled);
  $("#st2").classList.toggle("on",locations.length>0);
  $("#st3").classList.toggle("on",valid.length>0);
  renderAI();
  invalidateGemini();
}
function invalidateGemini(){var o=$("#geminiOut");if(o&&/Gemini 정밀 분석|분석 중|분석 실패|네트워크 오류/.test(o.innerHTML)){o.innerHTML='<div class="ai empty">측정 데이터가 변경됐습니다 — \u2018AI 분석\u2019을 다시 눌러 최신 Gemini 분석을 받으세요.</div>';}}

function feel_(d){if(d>=10)return"체감상 소음이 절반 가까이 줄어드는 큰 변화입니다.";if(d>=6)return"확연히 조용해졌다고 느껴지는 수준입니다.";if(d>=3)return"또렷하게 조용해진 것을 느낄 수 있는 수준입니다.";if(d>=0)return"측정 오차 범위라 체감 차이는 크지 않을 수 있습니다.";return"오히려 더 시끄러워져 다시 확인이 필요합니다.";}
function dbScene_(d){if(d<25)return"속삭임 수준의 매우 정숙한 환경";if(d<35)return"조용한 도서관·심야 주택가 수준";if(d<45)return"조용한 주거 실내 수준";if(d<55)return"일반 사무실·냉장고 소음 수준";if(d<65)return"실내 일상 대화 수준";if(d<75)return"번화가·진공청소기 수준";return"교통 소음이 큰 매우 시끄러운 수준";}
function aiReport(){
  var valid=locations.map(function(loc){return{loc:loc,c:computeLoc(loc)}}).filter(function(x){return x.c.ready});
  var usCount=locations.filter(function(l){return l.us&&l.us.some(function(p){return p.b||p.a})}).length;
  if(!valid.length&&!usCount)return null;
  var nm=function(x){return x.loc.name||"이름없는 위치"};
  var cust=[],pro=[],grade="기록",color="#7A8A80",av=null,best,worst,neg=[];
  if(valid.length){
    var imps=valid.map(function(x){return x.c.imp});
    av=r1(imps.reduce(function(a,b){return a+b},0)/valid.length);
    var sorted=valid.slice().sort(function(a,b){return b.c.imp-a.c.imp});
    best=sorted[0];worst=sorted[sorted.length-1];
    if(av>=CONFIG.IMP_STRONG){grade="우수";color="#1B5E20";}
    else if(av>=CONFIG.IMP_GOOD){grade="양호";color="#2E7D32";}
    else if(av>=0){grade="미미";color="#7A8A80";}
    else{grade="재점검";color="#C62828";}
    neg=valid.filter(function(x){return x.c.imp<0});
    // 고객용(쉬운 설명)
    cust.push("수리 전·후를 비교하니 평균 "+av.toFixed(1)+"dB 줄었습니다 — "+feel_(av));
    cust.push("가장 조용해진 곳은 '"+nm(best)+"'로 "+Math.abs(best.c.imp)+"dB 줄었어요(수리 전 "+best.c.bAvg+" → 후 "+best.c.aAvg+"dB). 소음은 3dB만 줄어도 소리 에너지가 절반으로 주는 단위라, 숫자보다 체감이 큽니다.");
    if(neg.length)cust.push("단, '"+neg.map(nm).join("', '")+"'은(는) 수리 후 오히려 시끄러워져 다시 확인이 필요합니다.");
    if(usCount)cust.push("초음파 카메라 사진으로 수리 전 바람·소음이 새어 들던 자리와, 수리 후 그 자리가 막힌 모습을 눈으로 비교하실 수 있습니다.");
    cust.push(av>=CONFIG.IMP_GOOD?"정리하면, 수리 후 더 조용하고 외풍이 줄었습니다.":(av>=0?"정리하면, 변화가 크지 않아 추가 점검을 권해 드립니다.":"정리하면, 개선이 확인되지 않아 재시공이 필요합니다."));
    // 전문가용(건설사 보고)
    pro.push("[정량] 측정 "+valid.length+"개소, 평균 음압 저감 ΔLp = "+av.toFixed(1)+"dB(상대 비교, 휴대폰 앱 측정 ±"+CONFIG.PHONE_ERR+"dB 오차 포함).");
    pro.push("[최대/최소] 최대 저감 '"+nm(best)+"' "+best.c.imp+"dB(전 "+best.c.bAvg+"→후 "+best.c.aAvg+"dB)"+(valid.length>1?(" · 최소 '"+nm(worst)+"' "+worst.c.imp+"dB"):"")+".");
    pro.push("[판정] 종합 등급 "+grade+". 본 수치는 상대적 차음·기밀 개선 확인용이며 KS F 2292(통기량) 법적 등급과는 별개 지표.");
    var aAll=r1(valid.reduce(function(a,x){return a+x.c.aAvg},0)/valid.length);
    pro.push("[음환경] 수리 후 평균 실내 음압 "+aAll.toFixed(1)+"dB는 '"+dbScene_(aAll)+"'에 해당. (수리 전 평균 "+r1(valid.reduce(function(a,x){return a+x.c.bAvg},0)/valid.length).toFixed(1)+"dB → '"+dbScene_(r1(valid.reduce(function(a,x){return a+x.c.bAvg},0)/valid.length))+"')");
    pro.push("[허용범위] 주거 실내 권장치는 통상 35~40dB(A) 이하이며(WHO 침실 권장 약 30dB, 환경 실내소음 권고 참고), 수리 후 평균 "+aAll.toFixed(1)+"dB는 "+(aAll<=40?"권장 범위 이내로 일반 주거용 창호 기준에서 양호":(aAll<=45?"권장 상한에 근접 — 추가 차음 보강 검토 권장":"권장치 초과 — 차음 보강 필요"))+". ※ 본 측정은 음원을 창짝 사이에 둔 상대 비교값으로, 실제 생활소음 레벨과는 차이가 있을 수 있음.");
    if(neg.length)pro.push("[이상] '"+neg.map(nm).join("', '")+"' 수리 후 음압 증가 → 시공·재측정 재검 필요.");
  }else{
    cust.push("아직 소음 수치(사진)가 없어 비교를 표시하지 못했습니다. 수리 전·후 소음측정 사진을 넣어 주세요.");
    pro.push("[정량] 소음 dB 데이터 미입력 — 정량 평가 보류.");
  }
  if(usCount){
    pro.push("[초음파] 누설 경로(틈새) 전·후 비교 자료 "+usCount+"개소 확보(정성 진단). 차폐 시공 효과 보조 입증용.");
  }
  pro.push("[고지] "+CONFIG.NOTICE);
  pro.push("[측정기준] 측정값은 평균소음도(LAeq) 기준, 동일 음원·동일 시간·동일 거리/높이로 수리 전·후 측정. (최대 Lmax·최소 Lmin이 아닌 평균값 사용). 사진 OCR 인식값은 수동 보정 가능.");
  return{grade:grade,color:color,av:av,cust:cust,pro:pro};
}
function renderAI(){
  var box=$("#aiReport");if(!box)return;
  var r=aiReport();
  if(!r){box.innerHTML='<div class="ai empty">측정값이 입력되면 자동 분석이 표시됩니다.</div>';return}
  var list=(aiMode==="pro"?r.pro:r.cust);
  box.innerHTML='<div class="ai"><div class="hl">✨ 종합 진단<span class="grade" style="background:'+r.color+'">'+r.grade+'</span><span class="ai-toggle"><button id="aiCust" class="'+(aiMode==="cust"?"on":"")+'">고객용</button><button id="aiPro" class="'+(aiMode==="pro"?"on":"")+'">전문가용</button></span></div><ul>'+list.map(function(s){return '<li>'+escapeHtml(s)+'</li>'}).join("")+'</ul></div>';
  $("#aiCust").addEventListener("click",function(){aiMode="cust";renderAI()});
  $("#aiPro").addEventListener("click",function(){aiMode="pro";renderAI()});
}
function renderChart(){
  var wrap=$("#chart");
  var rows=locations.map(function(loc){return{loc:loc,c:computeLoc(loc)}}).filter(function(x){return x.c.ready});
  if(!rows.length){wrap.innerHTML='<div class="empty-state"><span class="em">📊</span>측정값을 입력하면<br>전·후 비교가 표시됩니다.</div>';return}
  if(chartMode==="num"){
    wrap.innerHTML=rows.map(function(x){var loc=x.loc,c=x.c;
      return '<div class="chart-row"><div class="name"><span>'+escapeHtml(loc.name||"(위치명 없음)")+'</span><span class="impchip">−'+c.imp+'dB</span></div>'
        +'<div style="display:flex;gap:8px;font-size:13px;color:var(--ink-2);font-variant-numeric:tabular-nums">'
        +'<span>수리 전 <b style="color:var(--ink)">'+c.bAvg+'</b>dB</span><span style="color:var(--ink-3)">·</span>'
        +'<span>수리 후 <b style="color:var(--brand-700)">'+c.aAvg+'</b>dB</span><span style="color:var(--ink-3)">·</span>'
        +'<span>판정 <b style="color:'+c.j.color+'">'+c.j.label+'</b></span></div></div>';
    }).join("");return;
  }
  var maxDb=Math.max.apply(null,rows.map(function(x){return Math.max(x.c.bAvg,x.c.aAvg)}).concat([1]));
  wrap.innerHTML=rows.map(function(x){var loc=x.loc,c=x.c;
    var wB=Math.max(Math.round(c.bAvg/maxDb*100),8),wA=Math.max(Math.round(c.aAvg/maxDb*100),8);
    return '<div class="chart-row"><div class="name"><span>'+escapeHtml(loc.name||"(위치명 없음)")+'</span><span class="impchip">▼ '+c.imp+'dB 감소</span></div>'
      +'<div class="bar-line bar-before"><span class="tag">전</span><div class="bar-track"><div class="bar-fill" style="width:'+wB+'%">'+c.bAvg+'</div></div></div>'
      +'<div class="bar-line bar-after"><span class="tag">후</span><div class="bar-track"><div class="bar-fill" style="width:'+wA+'%">'+c.aAvg+'</div></div></div></div>';
  }).join("");
}

function save(){
  var data={cond:{date:$("#c_date").value},locations:locations.map(function(l){return{id:l.id,name:l.name,before:l.before,after:l.after}})};
  try{localStorage.setItem(CONFIG.STORAGE_KEY,JSON.stringify(data))}catch(e){}
}
function load(){
  try{
    var raw=localStorage.getItem(CONFIG.STORAGE_KEY);if(!raw)return false;
    var d=JSON.parse(raw);
    if(d.cond){
      $("#c_date").value=d.cond.date||"";
    }
    locations=(Array.isArray(d.locations)?d.locations:[]).map(function(l){["before","after"].forEach(function(k){if(!Array.isArray(l[k])||!l[k].length)l[k]=[""]});l.beforePhoto=l.beforePhoto||null;l.afterPhoto=l.afterPhoto||null;if(!Array.isArray(l.us)||!l.us.length)l.us=[{b:null,a:null}];return l});return true;
  }catch(e){return false}
}

function sendToSheet(){
  if(!CONFIG.GAS_URL)return;
  var payload={site:$("#c_site").value,date:$("#c_date").value,avgImprovement:avgImprovement(),
    locations:locations.map(function(loc){var c=computeLoc(loc);return{name:loc.name,before:loc.before,after:loc.after,beforeAvg:c.bAvg,afterAvg:c.aAvg,improvement:c.imp,result:c.j?c.j.label:""}})};
  try{fetch(CONFIG.GAS_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)})}catch(e){}
}

function avgImprovement(){var v=locations.map(computeLoc).filter(function(c){return c.ready});if(!v.length)return"0.0";return r1(v.reduce(function(a,c){return a+c.imp},0)/v.length).toFixed(1)}
function geminiAnalyze(){
  var out=$("#geminiOut");if(!out)return;
  if(!CONFIG.GEMINI_PROXY_URL){out.innerHTML='<div class="ai empty">Gemini 프록시(GAS) URL이 설정되지 않았습니다. CONFIG.GEMINI_PROXY_URL에 GAS 웹앱 주소를 넣어주세요.</div>';return;}
  var valid=locations.map(function(loc){return{loc:loc,c:computeLoc(loc)}}).filter(function(x){return x.c.ready});
  if(!valid.length){out.innerHTML='<div class="ai empty">측정값(소음 사진)이 입력된 위치가 필요합니다.</div>';return;}
  var payload={site:$("#c_site").value,date:$("#c_date").value,avgImprovement:avgImprovement(),
    locations:valid.map(function(x){return{name:x.loc.name||"",before:x.c.bAvg,after:x.c.aAvg,improvement:x.c.imp,result:x.c.j.label,ultrasonic:(x.loc.us||[]).filter(function(p){return p.b||p.a}).length,placePhotos:(x.loc.placeLPhoto?1:0)+(x.loc.placeRPhoto?1:0)};})};
  out.innerHTML='<div class="ai empty">✨ Gemini 분석 중… (네트워크)</div>';
  var cb="gcb_"+Date.now();
  var done=false, s=document.createElement("script");
  var timer=setTimeout(function(){if(done)return;done=true;cleanup();out.innerHTML='<div class="ai empty">응답 시간 초과 — 다시 시도하세요.</div>';},30000);
  function cleanup(){try{delete window[cb];}catch(e){window[cb]=undefined;}if(s.parentNode)s.parentNode.removeChild(s);clearTimeout(timer);}
  window[cb]=function(d){if(done)return;done=true;cleanup();
    if(d&&d.ok&&d.text){out.innerHTML='<div class="ai"><div class="hl">✨ Gemini 정밀 분석</div><div style="font-size:13px;line-height:1.65;color:var(--ink-2);white-space:pre-wrap">'+escapeHtml(d.text)+'</div></div>';}
    else{out.innerHTML='<div class="ai empty">Gemini 분석 실패'+(d&&d.error?": "+escapeHtml(d.error):"")+'</div>';}
  };
  s.onerror=function(){if(done)return;done=true;cleanup();out.innerHTML='<div class="ai empty">네트워크 오류 — GAS 배포(액세스: 모든 사용자)와 URL을 확인하세요.</div>';};
  s.src=CONFIG.GEMINI_PROXY_URL+"?callback="+cb+"&data="+encodeURIComponent(JSON.stringify(payload));
  document.body.appendChild(s);
}

  $("#print-area").innerHTML=
     '<div class="pblock"><div class="r-head"><div class="r-title">창호 기밀성능 측정 결과 보고서</div><div class="r-org">청개구리샤시 · 1599-7380 · frogsash.co.kr</div></div></div>'

    +'<div class="pblock"><div class="r-sec">1. 위치별 측정 결과 (LAeq 기준)</div><table class="r-res"><thead><tr><th style="text-align:left">측정 위치</th><th>수리 전(dB)</th><th>수리 후(dB)</th><th>개선량(dB)</th><th>판정</th></tr></thead><tbody>'+(tableRows||'<tr><td colspan="5">입력된 위치 없음</td></tr>')+'</tbody></table></div>'
    +(aiList?'<div class="pblock"><div class="r-sec">2. 종합 분석 의견 (종합 등급 '+(r?r.grade:"")+')</div><ul class="r-ai">'+aiList+'</ul></div>':'')
    +(photoBlocks?'<div class="pblock"><div class="r-sec">3. 측정 사진</div></div><div class="pblock"><div class="r-note">※ 점검창호 사진 — (좌) 점검 창호 전면, (우) 창호 밀착·접합부 근접 촬영.</div></div>'+photoBlocks:'')
    +'<div class="pblock"><div class="r-notice">※ '+escapeHtml(CONFIG.NOTICE)+'</div><div class="r-foot">'+escapeHtml(CONFIG.COMPANY)+' &nbsp;|&nbsp; 발행일 '+date+'</div></div>';
}
function pdfName(){
  var s=($("#c_site").value||"현장").replace(/[\\/:*?"<>|]+/g,"").replace(/\s+/g," ").trim().slice(0,40);
  var d=($("#c_date").value||today());
  return "청개구리샤시_기밀성능_"+s+"_"+d+".pdf";
}
function savePDF(){
  var valid=locations.map(computeLoc).filter(function(c){return c.ready});
  if(!valid.length){toast("측정값(소음 dB)이 입력된 위치가 최소 1곳 필요합니다");return}
  if(!window.jspdf||!window.html2canvas){toast("PDF 모듈을 불러오는 중입니다. 잠시 후 다시 눌러주세요");return}
  buildPrint();sendToSheet();
  toast("PDF를 만드는 중…");
  var area=$("#print-area");
  area.style.cssText="display:block;position:fixed;left:-10000px;top:0;width:760px;background:#fff;color:#111";
  var pdf=new window.jspdf.jsPDF("p","mm","a4");
  var mL=14,mT=14,pw=pdf.internal.pageSize.getWidth(),ph=pdf.internal.pageSize.getHeight();
  var cw=pw-mL*2, y=mT;
  var blocks=Array.prototype.slice.call(area.querySelectorAll(".pblock"));
  function finish(){ area.style.cssText="display:none"; pdf.save(pdfName()); toast("PDF 저장 완료 — '내 파일 > 다운로드' 폴더를 확인하세요"); }
  function step(i){
    if(i>=blocks.length){ finish(); return; }
    window.html2canvas(blocks[i],{scale:2,backgroundColor:"#ffffff",useCORS:true}).then(function(canvas){
      var iw=cw, ih=canvas.height*cw/canvas.width;
      if(y+ih>ph-mT && y>mT){ pdf.addPage(); y=mT; }
      pdf.addImage(canvas.toDataURL("image/jpeg",0.9),"JPEG",mL,y,iw,ih);
      y+=ih+3.5;
      step(i+1);
    }).catch(function(e){ area.style.cssText="display:none"; toast("PDF 생성 실패 — 다시 시도해 주세요"); });
  }
  step(0);
}

function resetAll(){
  if(!confirm("모든 입력을 지우고 새로 시작할까요?"))return;
  localStorage.removeItem(CONFIG.STORAGE_KEY);locations=[];
  ["c_site"].forEach(function(id){$("#"+id).value=""});
  $("#c_date").value=today();
  addLocation();toast("초기화되었습니다");
}

document.addEventListener("DOMContentLoaded",function(){
  $("#condHead").addEventListener("click",function(){$("#condCard").classList.toggle("closed")});
  $("#aiCard .card-head").addEventListener("click",function(e){if(e.target.closest(".seg-toggle"))return;$("#aiCard").classList.toggle("closed");renderAI()});
  document.querySelectorAll("#condCard input, #condCard select").forEach(function(el){
    el.addEventListener("input",function(){save();locations.forEach(updateLocResult);updateSummary()});
  });
  $("#c_site").addEventListener("input",updateSummary);
  $("#goAi").addEventListener("click",function(){renderAI();var el=$("#aiCard");if(!el)return;el.classList.remove("closed");el.scrollIntoView({behavior:"smooth",block:"start"});el.classList.remove("flash");void el.offsetWidth;el.classList.add("flash");if(CONFIG.GEMINI_PROXY_URL)geminiAnalyze();});
  $("#goAiRe").addEventListener("click",function(){var el=$("#aiCard");if(el)el.classList.remove("closed");renderAI();if(CONFIG.GEMINI_PROXY_URL)geminiAnalyze();else{var o=$("#geminiOut");if(o)o.innerHTML='<div class="ai empty">Gemini 프록시(GAS) URL이 설정되지 않았습니다.</div>';}});
  $("#btnSave").addEventListener("click",savePDF);
  $("#btnReset").addEventListener("click",resetAll);
  var had=load();
  if(!$("#c_date").value)$("#c_date").value=today();
  if(!had||locations.length===0)addLocation();else render();
});
</script>
